<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:var(--ccpd-pink-100);font-family:var(--font-sans);min-height:100vh}
.nav{display:flex;align-items:center;gap:36px;padding:18px 32px;background:rgba(253,247,247,.88);backdrop-filter:blur(16px) saturate(1.2);border-bottom:1px solid rgba(0,0,0,.06);position:sticky;top:0}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none}
.brand img{width:40px;height:40px}
.bn{font-family:var(--font-display);font-weight:500;font-size:18px;letter-spacing:-0.02em;color:var(--ccpd-ink-900);line-height:1}
.bs{font-family:var(--font-sans);font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--ccpd-orange-600);margin-top:3px}
.links{display:flex;gap:30px;margin-left:auto}
.links a{position:relative;color:var(--ccpd-ink-900);font-size:14px;font-weight:500;text-decoration:none;padding:6px 0;transition:color 120ms}
.links a:hover{color:var(--ccpd-orange-600)}
.links a.on{color:var(--ccpd-ink-900)}
.links a.on::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--ccpd-orange-500);border-radius:2px}
.don{background:var(--ccpd-orange-500);color:#fff;padding:11px 20px;border-radius:999px;font-weight:600;font-size:14px;text-decoration:none;transition:background 120ms;display:inline-flex;align-items:center;gap:6px}
.don:hover{background:var(--ccpd-orange-600)}
.don svg{width:14px;height:14px}
.spacer{height:280px;background:linear-gradient(180deg,rgba(253,247,247,0) 0%,var(--ccpd-pink-100) 100%)}
</style></head><body>
<nav class="nav">
  <a class="brand" href="#"><img src="../assets/logo.png" alt=""><div><div class="bn">Chasing a Cure</div><div class="bs">Parkinson's Foundation</div></div></a>
  <div class="links"><a class="on">Home</a><a>About</a><a>Ways to Give</a><a>Concert for a Cure</a></div>
  <a class="don" href="#">Donate<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg></a>
</nav>
<div class="spacer"></div>
</body></html>
