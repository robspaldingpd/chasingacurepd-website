<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.446.0/dist/umd/lucide.min.js"></script>
<style>
body{margin:0;padding:26px;background:var(--bg);font-family:var(--font-sans);display:grid;grid-template-columns:repeat(8,1fr);gap:12px;color:#14213D}
.i{display:flex;flex-direction:column;align-items:center;gap:6px}
.i svg{stroke:#14213D;width:24px;height:24px;stroke-width:1.75}
.l{font-size:10px;font-family:var(--font-mono);color:var(--fg-muted)}
</style></head><body>
<div class="i"><i data-lucide="heart"></i><div class="l">heart</div></div>
<div class="i"><i data-lucide="activity"></i><div class="l">pulse</div></div>
<div class="i"><i data-lucide="calendar"></i><div class="l">calendar</div></div>
<div class="i"><i data-lucide="map-pin"></i><div class="l">map-pin</div></div>
<div class="i"><i data-lucide="mail"></i><div class="l">mail</div></div>
<div class="i"><i data-lucide="arrow-right"></i><div class="l">arrow</div></div>
<div class="i"><i data-lucide="chevron-down"></i><div class="l">chevron</div></div>
<div class="i"><i data-lucide="menu"></i><div class="l">menu</div></div>
<div class="i"><i data-lucide="search"></i><div class="l">search</div></div>
<div class="i"><i data-lucide="share-2"></i><div class="l">share</div></div>
<div class="i"><i data-lucide="instagram"></i><div class="l">ig</div></div>
<div class="i"><i data-lucide="facebook"></i><div class="l">fb</div></div>
<div class="i"><i data-lucide="linkedin"></i><div class="l">li</div></div>
<div class="i"><i data-lucide="external-link"></i><div class="l">ext</div></div>
<div class="i"><i data-lucide="music"></i><div class="l">music</div></div>
<div class="i"><i data-lucide="users"></i><div class="l">users</div></div>
<script>lucide.createIcons()</script>
</body></html>
