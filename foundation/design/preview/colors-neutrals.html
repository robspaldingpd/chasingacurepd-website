<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg);display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.sw{border-radius:8px;overflow:hidden;border:1px solid var(--border);background:#fff}
.chip{height:80px}
.meta{padding:10px 12px;font-family:var(--font-sans);font-size:11px;display:flex;justify-content:space-between;align-items:baseline}
.name{font-weight:600;color:var(--fg)}
.hex{color:var(--fg-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="sw"><div class="chip" style="background:#FBF8F2"></div><div class="meta"><span class="name">Cream 50</span><span class="hex">#FBF8F2</span></div></div>
<div class="sw"><div class="chip" style="background:#F6F1E6"></div><div class="meta"><span class="name">Cream 100</span><span class="hex">#F6F1E6</span></div></div>
<div class="sw"><div class="chip" style="background:#EFE7D5"></div><div class="meta"><span class="name">Cream 200</span><span class="hex">#EFE7D5</span></div></div>
<div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border)"></div><div class="meta"><span class="name">White</span><span class="hex">#FFFFFF</span></div></div>
<div class="sw"><div class="chip" style="background:#EDEDF0"></div><div class="meta"><span class="name">Gray 100</span><span class="hex">#EDEDF0</span></div></div>
<div class="sw"><div class="chip" style="background:#DCDDE3"></div><div class="meta"><span class="name">Gray 200</span><span class="hex">#DCDDE3</span></div></div>
<div class="sw"><div class="chip" style="background:#6B6F7D"></div><div class="meta"><span class="name">Gray 500</span><span class="hex">#6B6F7D</span></div></div>
<div class="sw"><div class="chip" style="background:#1A1C22"></div><div class="meta"><span class="name">Gray 900</span><span class="hex">#1A1C22</span></div></div>
</body></html>
