<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans);display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.b{background:#fff;padding:16px;text-align:center}
.r0{border:1px solid var(--border);border-radius:0}
.r4{border:1px solid var(--border);border-radius:4px}
.r12{border:1px solid var(--border);border-radius:12px}
.rp{border:1px solid var(--border);border-radius:999px}
.lbl{font-size:11px;color:var(--fg-muted);font-family:var(--font-mono);margin-top:8px}
.hh{font-family:var(--font-serif);font-size:16px;color:#14213D}
</style></head><body>
<div><div class="b r0"><div class="hh">Hero frame</div></div><div class="lbl">--radius-square · 0</div></div>
<div><div class="b r4"><div class="hh">Button</div></div><div class="lbl">--radius-sm · 4px</div></div>
<div><div class="b r12"><div class="hh">Card</div></div><div class="lbl">--radius-lg · 12px</div></div>
<div><div class="b rp"><div class="hh">Pill</div></div><div class="lbl">--radius-pill · 999</div></div>
</body></html>
