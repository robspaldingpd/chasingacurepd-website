<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans)}
.wrap{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.btn{font-family:var(--font-sans);font-weight:600;font-size:15px;padding:13px 22px;border-radius:4px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.p{background:#E05A39;color:#fff}
.p:hover{background:#C14A2C}
.s{background:#14213D;color:#fff}
.g{background:transparent;color:#14213D;border-color:#B8BAC4}
.g:hover{background:#F6F1E6}
.sm{padding:9px 14px;font-size:13px}
.lg{padding:16px 28px;font-size:17px}
.pill{background:#E05A39;color:#fff;border-radius:999px}
</style></head><body>
<div class="wrap">
  <button class="btn p">Donate now</button>
  <button class="btn p lg">Donate now →</button>
  <button class="btn s">Learn more</button>
  <button class="btn g">RSVP</button>
  <button class="btn p sm">Give $25</button>
  <button class="btn pill">Get tickets</button>
</div>
</body></html>
