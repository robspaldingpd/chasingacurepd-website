<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:30px;background:var(--bg);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.card{background:#fff;border-radius:12px;padding:22px;text-align:center}
.s1{box-shadow:0 1px 0 rgba(20,33,61,.06)}
.s2{box-shadow:0 1px 2px rgba(20,33,61,.06),0 8px 24px rgba(20,33,61,.06)}
.s3{box-shadow:0 2px 4px rgba(20,33,61,.08),0 16px 40px rgba(20,33,61,.10)}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);margin-top:8px}
.n{font-family:var(--font-serif);font-size:18px;color:#14213D}
</style></head><body>
<div><div class="card s1"><div class="n">Nav</div></div><div class="lbl">--shadow-nav</div></div>
<div><div class="card s2"><div class="n">Card</div></div><div class="lbl">--shadow-card</div></div>
<div><div class="card s3"><div class="n">Lift</div></div><div class="lbl">--shadow-lift</div></div>
</body></html>
