<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>FAQ accordion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 40px 24px; background: var(--ccpd-pink-50); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 8px; max-width: 720px; margin: 0 auto; }
  .item { background: #fff; border: 1px solid var(--ccpd-gray-100); border-radius: 8px; overflow: hidden; }
  .head { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; background: none; border: 0; cursor: pointer; text-align: left; gap: 16px; font-family: inherit; }
  .q { font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.4; color: var(--ccpd-ink-900); }
  .icon { font-size: 22px; color: var(--ccpd-orange-500); font-weight: 300; min-width: 20px; text-align: center; line-height: 1; }
  .body { padding: 0 24px 20px; font-size: 15px; line-height: 1.7; color: var(--ccpd-ink-700); }
</style>
</head>
<body>
  <div class="stack">
    <div class="item">
      <button class="head"><span class="q">Is my ticket tax-deductible?</span><span class="icon">−</span></button>
      <div class="body">Chasing a Cure Foundation is a 501(c)(3) nonprofit. Ticket purchases may be partially tax-deductible to the extent permitted by law. For official acknowledgment, contact wendy@chasingacurepd.org.</div>
    </div>
    <div class="item">
      <button class="head"><span class="q">Where is the event?</span><span class="icon">+</span></button>
    </div>
    <div class="item">
      <button class="head"><span class="q">What if it rains?</span><span class="icon">+</span></button>
    </div>
    <div class="item">
      <button class="head"><span class="q">How does the boat raffle work?</span><span class="icon">+</span></button>
    </div>
  </div>
</body>
</html>
