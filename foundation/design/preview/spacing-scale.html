<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans)}
.g{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end}
.cell{background:#E05A39;border-radius:4px}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);text-align:center;margin-top:6px}
</style></head><body>
<div class="g">
  <div><div class="cell" style="height:4px"></div><div class="lbl">1 · 4px</div></div>
  <div><div class="cell" style="height:8px"></div><div class="lbl">2 · 8px</div></div>
  <div><div class="cell" style="height:16px"></div><div class="lbl">4 · 16px</div></div>
  <div><div class="cell" style="height:24px"></div><div class="lbl">5 · 24px</div></div>
  <div><div class="cell" style="height:48px"></div><div class="lbl">7 · 48px</div></div>
  <div><div class="cell" style="height:96px"></div><div class="lbl">9 · 96px</div></div>
</div>
</body></html>
