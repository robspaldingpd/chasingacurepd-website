<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.b{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:0.04em}
.coral{background:#FBE4D9;color:#C14A2C}
.navy{background:#14213D;color:#FBF8F2}
.cream{background:#F6F1E6;color:#14213D;border:1px solid var(--border)}
.ok{background:#D8EBE1;color:#2F7D5B}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.ey{font-family:var(--font-sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:#E05A39}
</style></head><body>
<span class="b coral"><span class="dot"></span>100% to research</span>
<span class="b navy">501(c)(3)</span>
<span class="b cream">Team Fox partner</span>
<span class="b ok">Platinum seal</span>
<span class="ey">— Our Why</span>
<span class="ey" style="color:var(--fg-muted)">Chapter 02</span>
</body></html>
