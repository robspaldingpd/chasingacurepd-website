<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--ccpd-pink-50); font-family: var(--font-sans); }
  h2 { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ccpd-gray-500); margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; max-width: 1100px; }
  .swatch { border-radius: 12px; height: 200px; position: relative; overflow: hidden; box-shadow: var(--shadow-card); }
  .label { position: absolute; bottom: 14px; left: 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Hero photo — campaign hero */
  .bg-hero { background: radial-gradient(ellipse at 30% 20%, rgba(249, 128, 8, 0.35) 0%, transparent 50%), radial-gradient(ellipse at 80% 40%, rgba(232, 192, 192, 0.4) 0%, transparent 55%), linear-gradient(180deg, #3a2828 0%, #1a1010 60%, #000 100%); }
  .bg-hero::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.5; }
  .bg-hero .label { color: rgba(251,248,242,0.85); }

  /* Concert hero — purple/plum mood */
  .bg-concert { background: radial-gradient(ellipse at 70% 20%, rgba(249, 128, 8, 0.22) 0%, transparent 55%), radial-gradient(ellipse at 20% 70%, rgba(232, 192, 192, 0.25) 0%, transparent 55%), linear-gradient(180deg, #2a1e2a 0%, #14101a 100%); }
  .bg-concert::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 60%); }
  .bg-concert .label { color: rgba(251,248,242,0.85); }

  /* Pink default — section background */
  .bg-pink { background: var(--ccpd-pink-50); border: 1px solid var(--ccpd-gray-100); }
  .bg-pink .label { color: var(--ccpd-gray-700); }

  /* Brand warm — closer / closing CTA */
  .bg-warm { background: var(--ccpd-pink-500); }
  .bg-warm .label { color: var(--ccpd-ink-900); }

  /* Ink stats panel */
  .bg-ink { background: var(--ccpd-ink-900); }
  .bg-ink::before { content: ''; position: absolute; top: -80px; right: -80px; width: 360px; height: 360px; background: radial-gradient(circle, rgba(249, 128, 8, 0.25) 0%, transparent 70%); }
  .bg-ink .label { color: rgba(251,248,242,0.85); }

  /* Photo placeholder — story */
  .bg-photo { background: var(--ccpd-pink-200); background-image: radial-gradient(circle at 30% 30%, rgba(249, 128, 8, 0.18) 0%, transparent 55%), linear-gradient(135deg, var(--ccpd-pink-400) 0%, var(--ccpd-pink-600) 100%); }
  .bg-photo::after { content: ''; position: absolute; inset: 24px; border: 1px solid rgba(26, 26, 26, 0.12); }
  .bg-photo .label { color: var(--ccpd-ink-800); }
</style>
</head>
<body>
  <h2>Section backgrounds</h2>
  <div class="grid">
    <div class="swatch bg-hero"><span class="label">Hero · dark + grid</span></div>
    <div class="swatch bg-concert"><span class="label">Concert · plum mood</span></div>
    <div class="swatch bg-pink"><span class="label">Pink-50 · default</span></div>
    <div class="swatch bg-warm"><span class="label">Pink-500 · warm closer</span></div>
    <div class="swatch bg-ink"><span class="label">Ink-900 · stats / partner</span></div>
    <div class="swatch bg-photo"><span class="label">Photo placeholder</span></div>
  </div>
</body>
</html>
