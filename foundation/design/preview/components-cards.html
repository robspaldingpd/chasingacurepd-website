<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 2px rgba(20,33,61,.06),0 8px 24px rgba(20,33,61,.06)}
.eb{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-muted);font-weight:600;margin-bottom:8px}
.h{font-family:var(--font-serif);font-size:22px;color:#14213D;margin:0 0 6px;line-height:1.2}
.p{font-size:14px;color:var(--fg-muted);margin:0;line-height:1.55}
.navy{background:#14213D;color:#FBF8F2;border-radius:12px;padding:22px}
.navy .h{color:#FBF8F2;font-style:italic;font-size:20px}
.navy .byline{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#F4A98F;margin-top:10px;font-weight:600}
.stat{background:var(--ccpd-cream-100);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.stat .n{font-family:var(--font-serif);font-size:44px;color:#E05A39;line-height:1}
.stat .l{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--fg-muted);margin-top:6px;font-weight:600}
</style></head><body>
<div class="card"><div class="eb">Our Why</div><div class="h">A promise kept.</div><p class="p">The foundation is Wendy's promise to her mother — and to every family still waiting.</p></div>
<div class="navy"><div class="h">"We understand the fear, the grief, and the quiet weight families carry."</div><div class="byline">— Wendy Chase, Co-founder</div></div>
<div class="stat"><div class="n">$0</div><div class="l">In salaries — 100% volunteer-run since 2018</div></div>
<div class="stat"><div class="n">$185M</div><div class="l">Raised by MJFF</div></div>
</body></html>
