<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--bg);display:grid;grid-template-columns:1fr 1fr;gap:10px;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;background:#fff;border:1px solid var(--border)}
.sw{width:36px;height:36px;border-radius:6px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.name{font-size:13px;font-weight:600;color:var(--fg)}
.tok{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}
.hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-left:auto}
</style></head><body>
<div class="row"><div class="sw" style="background:#FDF7F7"></div><div><div class="name">bg</div><div class="tok">--bg</div></div><span class="hex">#FDF7F7</span></div>
<div class="row"><div class="sw" style="background:#FFFFFF"></div><div><div class="name">bg-elev</div><div class="tok">--bg-elev</div></div><span class="hex">#FFFFFF</span></div>
<div class="row"><div class="sw" style="background:#E8C0C0"></div><div><div class="name">bg-warm</div><div class="tok">--bg-warm</div></div><span class="hex">#E8C0C0</span></div>
<div class="row"><div class="sw" style="background:#000000"></div><div><div class="name">bg-inverse</div><div class="tok">--bg-inverse</div></div><span class="hex">#000000</span></div>
<div class="row"><div class="sw" style="background:#FFEFDC"></div><div><div class="name">bg-accent</div><div class="tok">--bg-accent</div></div><span class="hex">#FFEFDC</span></div>
<div class="row"><div class="sw" style="background:#000000"></div><div><div class="name">fg</div><div class="tok">--fg</div></div><span class="hex">#000000</span></div>
<div class="row"><div class="sw" style="background:#6B6F7D"></div><div><div class="name">fg-muted</div><div class="tok">--fg-muted</div></div><span class="hex">#6B6F7D</span></div>
<div class="row"><div class="sw" style="background:#F98008"></div><div><div class="name">fg-accent / link</div><div class="tok">--fg-accent · --link</div></div><span class="hex">#F98008</span></div>
<div class="row"><div class="sw" style="background:#DCDDE3"></div><div><div class="name">border</div><div class="tok">--border</div></div><span class="hex">#DCDDE3</span></div>
<div class="row"><div class="sw" style="background:#E87300"></div><div><div class="name">link-hover</div><div class="tok">--link-hover</div></div><span class="hex">#E87300</span></div>
</body></html>
