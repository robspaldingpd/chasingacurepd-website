<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--bg);display:flex;align-items:center;gap:24px;min-height:calc(100vh - 40px)}
.logo{flex:none;width:140px;height:140px;display:flex;align-items:center;justify-content:center}
.logo img{max-width:100%;max-height:100%}
.rule{width:1px;align-self:stretch;background:var(--border);margin:18px 0}
.tag{font-family:var(--font-serif);font-size:28px;line-height:1.2;letter-spacing:-0.015em;color:var(--ccpd-ink-900);max-width:320px}
.tag em{font-style:italic;color:var(--ccpd-orange-500);font-weight:500}
</style></head><body>
<div class="logo"><img src="../assets/logo.png" alt="Chasing a Cure Parkinson's Foundation"></div>
<div class="rule"></div>
<div class="tag">We fund the <em>science</em> behind breakthroughs.</div>
</body></html>
